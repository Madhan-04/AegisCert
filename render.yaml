services:
  - type: web
    name: aegis-cert-backend
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/project/data/database.sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://aegis-cert.vercel.app
